name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install libusb

      - name: Build and install
        run: make install

      - name: Verify no runtime deps on homebrew
        run: |
          otool -L /Applications/CollarTest.app/Contents/MacOS/collar_tester
          ! otool -L /Applications/CollarTest.app/Contents/MacOS/collar_tester | grep -q /opt/homebrew

      - name: Package app
        run: cd /Applications && zip -r /tmp/CollarTest.zip CollarTest.app

      - uses: actions/upload-artifact@v4
        with:
          name: CollarTest
          path: /tmp/CollarTest.zip
